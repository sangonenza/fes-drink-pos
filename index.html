<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#15325b">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg">
<title>GFB</title>
<style>
:root{
  --soft:#1e78d7; --soft-bg:#e8f2fc;
  --nonal:#0f9d7a; --nonal-bg:#e5f6f0;
  --can:#e07020;  --can-bg:#fdf0e4;
  --draft:#c79400; --draft-bg:#fdf6dd;
  --craft:#a1621f; --craft-bg:#f7ecdf;
  --ink:#1c2330; --sub:#67718a; --line:#dde3ee;
  --bg:#f2f4f8; --card:#fff;
  --ok:#1a9e57; --ng:#d63333; --warn:#b97a00;
  --primary:#15325b;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:var(--bg); color:var(--ink); font-size:16px;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));}
/* touch-action:manipulation でダブルタップズームを抑止(連打対策)。選択・長押しメニューも無効化 */
button{font-family:inherit; font-size:inherit; border:none; border-radius:12px; cursor:pointer; color:var(--ink); background:#fff;
  touch-action:manipulation; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none}
button:active{transform:scale(.95); filter:brightness(.8)} /* 押した感 */
button:disabled{opacity:.45; cursor:default}
input,select,textarea{font-family:inherit; font-size:16px; border:1px solid var(--line); border-radius:10px; padding:10px 12px; width:100%; background:#fff; color:var(--ink)}
h2{font-size:18px; margin:18px 0 10px}
.sub{color:var(--sub); font-size:13px}

/* header */
header{position:sticky; top:0; z-index:20; background:var(--primary); color:#fff;
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  padding-top:calc(10px + env(safe-area-inset-top));}
header .ttl{font-weight:700; font-size:16px; white-space:nowrap}
#locb{white-space:nowrap}
#chip{margin-left:auto; font-size:12px; padding:4px 10px; border-radius:99px; background:#ffffff2b; white-space:nowrap}
#chip.on{background:#1a9e57}
#chip.off{background:#d63333}
#gear{background:transparent; color:#fff; font-size:20px; padding:2px 6px}

/* bottom nav */
nav{position:fixed; bottom:0; left:0; right:0; z-index:20; background:#fff; border-top:1px solid var(--line);
  display:flex; padding-bottom:env(safe-area-inset-bottom);}
nav button{flex:1; background:none; border-radius:0; padding:8px 0 6px; font-size:11px; color:var(--sub); display:flex; flex-direction:column; align-items:center; gap:2px}
nav button .ico{font-size:20px}
nav button.act{color:var(--primary); font-weight:700}

main{max-width:760px; margin:0 auto; padding:12px 12px 24px}
.view{display:none}
.view.act{display:block}
.card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px}
.row{display:flex; align-items:center; gap:10px}
.grow{flex:1}
.right{text-align:right}
.btn{padding:12px 16px; border:1px solid var(--line); background:#fff; font-weight:600}
.btn.primary{background:var(--primary); color:#fff; border-color:var(--primary)}
.btn.danger{background:#fff; color:var(--ng); border-color:#f0bcbc}
.btn.sm{padding:8px 12px; font-size:14px}
.toolbar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px}

/* register grid */
.cathead{font-size:13px; font-weight:700; margin:14px 2px 6px; color:var(--sub)}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px}
.prod{position:relative; text-align:left; padding:12px; min-height:76px; border:1px solid var(--line); border-left-width:6px; display:flex; flex-direction:column; gap:2px}
.prod .pname{font-weight:700; line-height:1.25}
.prod .pprice{color:var(--sub); font-size:14px}
.prod .pstock{position:absolute; top:8px; right:8px; font-size:11px; padding:2px 7px; border-radius:99px; background:#eef1f6; color:var(--sub)}
.prod .pstock.low{background:#fdeaea; color:var(--ng); font-weight:700}
.prod .psel{position:absolute; bottom:8px; right:8px; min-width:24px; height:24px; border-radius:99px; background:var(--primary); color:#fff; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 6px}
.prod.cat-soft{border-left-color:var(--soft); background:var(--soft-bg)}
.prod.cat-nonal{border-left-color:var(--nonal); background:var(--nonal-bg)}
.prod.cat-can{border-left-color:var(--can); background:var(--can-bg)}
.prod.cat-draft{border-left-color:var(--draft); background:var(--draft-bg)}
.prod.cat-craft{border-left-color:var(--craft); background:var(--craft-bg)}
.prod.sel{outline:3px solid var(--primary); outline-offset:-1px}

/* cart bar */
#cartbar{position:fixed; left:0; right:0; bottom:calc(52px + env(safe-area-inset-bottom)); z-index:19;
  background:#fff; border-top:2px solid var(--primary); box-shadow:0 -4px 16px rgba(20,40,80,.12);
  max-height:46vh; overflow:auto;}
#cartbar .inner{max-width:760px; margin:0 auto; padding:8px 12px}
.cartrow{display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px dashed var(--line); font-size:15px}
.cartrow .nm{flex:1; font-weight:600}
.stepper{display:flex; align-items:center; gap:2px}
.stepper button{width:40px; height:40px; font-size:20px; font-weight:700; background:#eef1f6; border-radius:10px}
.stepper .q{min-width:34px; text-align:center; font-weight:700; font-size:17px}
.carttotal{display:flex; align-items:center; gap:10px; padding-top:8px}
.carttotal .tt{font-size:19px; font-weight:800}
.carttotal .cnt{color:var(--sub); font-size:13px}

/* modal */
#modal{position:fixed; inset:0; z-index:40; background:rgba(15,22,40,.55); display:none; align-items:flex-end; justify-content:center}
#modal.open{display:flex}
#modal .box{background:#fff; width:100%; max-width:560px; border-radius:18px 18px 0 0; padding:16px 16px calc(16px + env(safe-area-inset-bottom)); max-height:92vh; overflow:auto}
@media(min-width:600px){ #modal{align-items:center} #modal .box{border-radius:18px} }
.mhead{display:flex; align-items:center; margin-bottom:10px}
.mhead b{font-size:17px}
.mhead .x{margin-left:auto; font-size:15px; color:var(--sub); background:#eef1f6; padding:8px 14px; border-radius:99px}
.payopts{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.payopts button{padding:26px 10px; font-size:20px; font-weight:800; border:2px solid var(--line)}
.payopts .cash{background:#eafaf0; border-color:#bfe7cf}
.payopts .paypay{background:#eef0ff; border-color:#c5cbf5; color:#d02b2b}
.bigyen{font-size:34px; font-weight:800; text-align:center; margin:6px 0}
.bigyen.ng{color:var(--ng); font-size:22px}
.keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px}
.keypad button{padding:14px 0; font-size:20px; font-weight:700; background:#eef1f6}
.exactbtn{width:100%; margin-top:12px; padding:18px; font-size:19px; font-weight:800; background:#eafaf0; border:2px solid #6fcb96}
.confirm-list .cartrow{font-size:16px}
.kv{display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px dashed var(--line); font-size:16px}
.kv b{font-size:18px}
.donewrap{text-align:center; padding:16px 0}
.donewrap .mark{font-size:52px}
.donewrap .change{font-size:44px; font-weight:900; margin:8px 0}
.chips{display:flex; gap:8px; flex-wrap:wrap; margin:8px 0}
.chips button{padding:9px 14px; background:#eef1f6; border-radius:99px; font-size:14px}
.chips button.sel{background:var(--primary); color:#fff}

/* lists */
.listrow{display:flex; align-items:center; gap:10px; padding:11px 2px; border-bottom:1px solid var(--line)}
.listrow:last-child{border-bottom:none}
.catdot{width:10px; height:10px; border-radius:99px; flex:none}
.catdot.soft{background:var(--soft)} .catdot.nonal{background:var(--nonal)} .catdot.can{background:var(--can)} .catdot.draft{background:var(--draft)} .catdot.craft{background:var(--craft)}
.stocknum{font-size:20px; font-weight:800; min-width:70px; text-align:right}
.stocknum.low{color:var(--ng)}
.tag{font-size:11px; padding:2px 8px; border-radius:99px; background:#eef1f6; color:var(--sub); flex:none}
.cancelled{text-decoration:line-through; opacity:.55}
table.rep{width:100%; border-collapse:collapse; font-size:14px}
table.rep th,table.rep td{padding:7px 6px; border-bottom:1px solid var(--line); text-align:right}
table.rep th:first-child,table.rep td:first-child{text-align:left}
.statgrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:8px}
.stat{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px}
.stat .v{font-size:22px; font-weight:800}
.stat .l{font-size:12px; color:var(--sub)}
.banner{border-radius:12px; padding:11px 13px; font-size:14px; margin-bottom:10px}
.banner.warn{background:#fdf3dd; color:#7a5600; border:1px solid #ecd9a0}
.banner.info{background:#e8f2fc; color:#1b5a9e; border:1px solid #bcd8f2}
.diffpos{color:var(--ok); font-weight:700}
.diffneg{color:var(--ng); font-weight:700}
label.fld{display:block; margin:10px 0 4px; font-size:13px; color:var(--sub); font-weight:600}
.empty{text-align:center; color:var(--sub); padding:40px 10px}

/* toast / gate */
#toast{position:fixed; bottom:calc(120px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); z-index:60;
  background:var(--ink); color:#fff; padding:10px 18px; border-radius:99px; font-size:14px; opacity:0; transition:opacity .25s; pointer-events:none; white-space:nowrap}
#toast.show{opacity:1}
#gate{position:fixed; inset:0; z-index:100; background:var(--primary); color:#fff; display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:24px}
#gate.open{display:flex}
#gate input{max-width:240px; text-align:center; font-size:24px; letter-spacing:6px}
</style>
</head>
<body>

<header>
  <span class="ttl">🍻 GFB</span>
  <button id="locb" onclick="toggleLoc()" style="font-size:12px; background:#ffffff2b; color:#fff; padding:3px 9px; border-radius:99px">…</button>
  <span id="chip">…</span>
  <button id="gear" onclick="go('settings')">⚙︎</button>
</header>

<main>
  <div id="view-register" class="view"></div>
  <div id="view-products" class="view"></div>
  <div id="view-stock" class="view"></div>
  <div id="view-report" class="view"></div>
  <div id="view-count" class="view"></div>
  <div id="view-cash" class="view"></div>
  <div id="view-stats" class="view"></div>
  <div id="view-tt" class="view"></div>
  <div id="view-settings" class="view"></div>
</main>

<div id="cartbar" style="display:none"><div class="inner" id="cartinner"></div></div>

<nav>
  <button data-v="register" onclick="go('register')"><span class="ico">🧾</span>レジ</button>
  <button data-v="stock" onclick="go('stock')"><span class="ico">📦</span>在庫</button>
  <button data-v="report" onclick="go('report')"><span class="ico">📊</span>集計</button>
  <button data-v="tt" onclick="go('tt')"><span class="ico">🎤</span>タイテ</button>
</nav>

<div id="modal"><div class="box" id="mbox"></div></div>
<div id="toast"></div>
<div id="gate">
  <div style="font-size:40px">🍻</div>
  <b>パスコードを入力</b>
  <input id="gatein" type="number" inputmode="numeric" placeholder="****">
  <button class="btn" style="min-width:160px" onclick="tryUnlock()">解錠</button>
</div>

<script>
'use strict';
/* ================= 基盤 ================= */
const LS_KEY = 'fespos.v1';
const CATS = { soft:'ソフトドリンク', nonal:'ノンアルコール', can:'缶のお酒', draft:'生ビール', craft:'クラフトビール' };
// 価格はpricesテーブル(ジャンル単位)が正。未作成・未同期の間はproducts.priceへフォールバック
const genrePrice = c => { const r=(S.priceRows||[]).find(x=>x.category===c); return r ? r.price : null; };
const priceOf = p => { const g=genrePrice(p.category); return g!=null ? g : p.price; };
const LOCS = ['坂下','坂上']; // 販売所の内部キー(既存データ互換のため値は据え置き)
const LOC_LABEL = { '坂下':'坂ドリンク', '坂上':'丘の上ドリンク' }; // 表示名
const locName = l => LOC_LABEL[l] || l || '';
const EV_TYPES = { initial:'初期搬入', restock:'補充', loss:'ロス', adjust:'棚卸し調整' };
const DENOMS = [10000, 5000, 1000, 500, 100, 50, 10]; // 釣り銭準備金の金種
const denomName = d => d>=1000 ? `${d.toLocaleString()}円札` : `${d}円玉`;
// 開催情報の既定値(GFB'26)。管理者設定で編集するとクラウド経由で全端末に配布される
const DEFAULT_EVENT = {
  name: "GFB'26",
  days: ['2026-07-18','2026-07-19'],
  open: '10:30', end: '21:00',
  tt: {
    d1saka: "7:00 スタッフ会場入り\n9:00-9:45 サウンドチェック\n9:45-10:15 チーナ リハーサル\n10:20-10:30 DJチェック・会場なおし\n10:30-11:35 DJ yusk/minisky\n11:35-12:15 チーナ\n12:15-12:55 DJ 星原喜一郎 (転換)\n12:55-13:35 浪漫革命\n13:35-14:10 DJ ヒサシtheKID (転換)\n14:10-14:50 DENIMS\n14:50-15:30 DJ KIKUCHI HIDEAKI (転換)\n15:30-16:10 TENDRE\n16:10-16:50 DJ KATE (転換)\n16:50-17:30 Homecomings\n17:30-18:10 DJ ヒサシtheKID (転換)\n18:10-18:50 saccharin\n18:50-19:35 DJ 星原喜一郎 (転換)\n19:35-20:20 んoon\n20:20-20:45 DJ yusk/minisky",
    d1oka: "7:00 スタッフ会場入り\n9:00-9:45 サウンドチェック\n9:45-10:15 Johnson KOGA リハ\n11:00-11:30 Johnson KOGA\n11:30-12:20 転換\n12:20-12:50 松澤在音\n12:50-13:35 転換\n13:35-14:05 Gingersamm\n14:05-14:55 転換\n14:55-15:25 SYAYOS\n15:25-16:15 転換\n16:15-16:45 mayu (band set)\n16:45-17:35 転換\n17:35-18:05 Nikoん\n18:05-18:55 転換\n18:55-19:30 ゴリラ祭ーズ",
    d2saka: "7:30 スタッフ会場入り\n9:00-9:45 サウンドチェック\n9:45-10:15 Khaki リハーサル\n10:20-10:30 DJチェック・会場なおし\n10:30-11:25 DJ yusk/minisky\n11:25-12:05 Khaki\n12:05-12:45 DJ 片山翔太 (転換)\n12:45-13:25 トリプルファイヤー\n13:25-14:05 DJ ノロマトンマVC (転換)\n14:05-14:45 DYGL\n14:45-15:25 DJ YIYI (転換)\n15:25-16:05 YONA YONA WEEKENDERS\n16:05-16:45 DJ HAGA (転換)\n16:45-17:25 SuiseiNoboAz\n17:25-18:10 DJ yusk/minisky (転換)\n18:10-18:50 LOSTAGE\n18:50-19:40 DJ 片山翔太 (転換)\n19:40-20:20 TENDOUJI\n20:20-20:45 DJ yusk/minisky",
    d2oka: "7:30 スタッフ会場入り\n9:00-9:45 サウンドチェック\n9:45-10:15 田山ショーゴ リハ\n10:50-11:20 田山ショーゴ (BAND SET)\n11:20-12:10 転換(クリトリック・リス自由時間 音80%)\n12:10-12:40 クリトリック・リス\n12:40-13:30 転換\n13:30-14:00 Gateballsers\n14:00-14:50 転換\n14:50-15:20 テレビ大陸音頭\n15:20-16:10 転換\n16:10-16:40 ベランダ\n16:40-17:30 転換\n17:30-18:05 Soft Pine\n18:05-18:55 転換\n18:55-19:35 和久井沙良"
  },
  entry: '08:30',     // 会場入り(売店クルー)
  soundoff: '20:45',  // END 完全音止め
  // end(21:00)=END 撤収。OPEN/完全音止め/撤収の3つは会場全体マーカーとして表示
  shifts: { d1: [], d2: [] } // [{s:'10:30', e:'13:00', name:'和真', loc:'坂下'}, ...]
};
const normShifts = sh => ({ d1: Array.isArray(sh&&sh.d1)?sh.d1:[], d2: Array.isArray(sh&&sh.d2)?sh.d2:[] });

const uuid = () => crypto.randomUUID ? crypto.randomUUID() :
  'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return (c=='x'?r:(r&0x3|0x8)).toString(16)});
const nowIso = () => new Date().toISOString();
const yen = n => '¥' + Number(n||0).toLocaleString('ja-JP');
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const hhmm = iso => { const d=new Date(iso); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}` };
const hhmmss = iso => { const d=new Date(iso); return hhmm(iso)+':'+String(d.getSeconds()).padStart(2,'0') };
const localDay = iso => { const d=new Date(iso); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` };
const dayLabel = k => { const p=k.split('-'); return `${Number(p[1])}/${Number(p[2])}` };
const $id = id => document.getElementById(id);

let S = {
  products:[], events:[], sales:[], cash:[], staff:[], staffDrinks:[],
  priceRows:[], floats:[],
  outbox:[], pulls:{}, event: DEFAULT_EVENT,
  cfg:{ deviceId:uuid(), device:'レジ1', url:'', key:'', pass:'', threshold:10 },
};
try { const raw = localStorage.getItem(LS_KEY); if (raw) S = Object.assign(S, JSON.parse(raw)); } catch(e){}
if (!S.cfg.loc) S.cfg.loc = LOCS[0];
if (!S.event) S.event = DEFAULT_EVENT;
if (!S.staff) S.staff = [];
if (!S.staffDrinks) S.staffDrinks = [];
if (!S.priceRows) S.priceRows = [];
if (!S.floats) S.floats = [];
const save = () => { try { localStorage.setItem(LS_KEY, JSON.stringify(S)); } catch(e){ toast('保存エラー: 容量不足の可能性'); } };

let ui = { view:'register', cart:{}, devices:[], countInputs:{}, countResult:null, lastSyncAt:null, syncErr:false,
  repDay:'today', histLimit:60, staffSel:null, stLoc:null, stDay:null, stProd:'all', binSel:null,
  ttDay:null, ttWantScroll:false, shiftPick:{}, shS:'', shE:'', shLoc:'' };

function toast(msg){ const t=$id('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),2200); }

/* ================= 在庫計算(導出値) ================= */
function stockMap(){
  const m = {};
  for (const e of S.events) m[e.product_id] = (m[e.product_id]||0) + e.qty_delta;
  for (const s of S.sales) if (s.status==='completed')
    for (const it of s.items) m[it.product_id] = (m[it.product_id]||0) - it.qty;
  for (const d of S.staffDrinks) if (!d.cancelled)
    m[d.product_id] = (m[d.product_id]||0) - 1;
  return m;
}
const prodById = id => S.products.find(p=>p.id===id);
const activeProducts = () => S.products.filter(p=>p.active).sort((a,b)=>a.sort_order-b.sort_order);
const locOf = p => p.location || LOCS[0]; // 移行前の既存データは坂下扱い
const locProducts = () => activeProducts().filter(p=>locOf(p)===S.cfg.loc);

/* ================= 同期(Supabase REST / ポーリング) ================= */
const cfgOk = () => S.cfg.url && S.cfg.key;
async function sb(path, opts={}){
  const key = S.cfg.key;
  // 旧形式(JWTのanon key)はBearer必須、新形式(sb_publishable_)はapikeyのみ(Bearerに載せると401)
  const headers = { apikey:key, 'Content-Type':'application/json', ...(opts.headers||{}) };
  if (key.startsWith('eyJ')) headers.Authorization = 'Bearer '+key;
  const res = await fetch(S.cfg.url.replace(/\/+$/,'') + '/rest/v1/' + path, { ...opts, headers });
  if (!res.ok) throw new Error('HTTP '+res.status+' '+(await res.text()).slice(0,200));
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}
const RETRY_4XX = new Set([401,403,408,425,429]); // 認証・タイムアウト・レート制限は一時的とみなし再送
async function pushOutbox(){
  while (S.outbox.length){
    const op = S.outbox[0];
    try {
      if (op.op==='insert'){
        // 一意制約+ignore-duplicatesで再送しても二重登録されない(冪等)
        await sb(`${op.table}?on_conflict=id`, { method:'POST', headers:{Prefer:'resolution=ignore-duplicates'}, body:JSON.stringify([op.row]) });
      } else if (op.op==='upsert'){
        // event_config/prices/cash_floats用: 上書き更新(LWW)
        await sb(`${op.table}?on_conflict=${op.conflict||'id'}`, { method:'POST', headers:{Prefer:'resolution=merge-duplicates'}, body:JSON.stringify([op.row]) });
      } else {
        await sb(`${op.table}?id=eq.${op.id}`, { method:'PATCH', body:JSON.stringify(op.patch) });
      }
    } catch(e){
      const mt = /^HTTP (\d\d\d)/.exec(e.message);
      const code = mt ? +mt[1] : 0;
      // 4xx(データ不正・制約違反)は再送しても直らない → 退避して先へ。1件の不良で全同期が止まるのを防ぐ
      if (code>=400 && code<500 && !RETRY_4XX.has(code)){
        (S.deadletter = S.deadletter || []).push({ op, error:e.message, at:nowIso() });
        S.outbox.shift(); save();
        console.warn('sync: 送信できないデータを退避:', op.table, e.message);
        continue;
      }
      throw e; // 通信断・5xx・認証/レート = 一時的なので次tickで再送
    }
    S.outbox.shift(); save();
  }
}
const PULLS = [
  { t:'products', ts:'updated_at', arr:'products' },
  { t:'stock_events', ts:'created_at', arr:'events' },
  { t:'sales', ts:'updated_at', arr:'sales' },
  { t:'cash_counts', ts:'created_at', arr:'cash' },
];
const PULLS_V2 = [ // v2.0以降の追加。テーブル未作成でも既存の同期を巻き込まない
  { t:'staff', ts:'updated_at', arr:'staff' },
  { t:'staff_drinks', ts:'updated_at', arr:'staffDrinks' },
  { t:'prices', ts:'updated_at', arr:'priceRows', key:'category' },
  { t:'cash_floats', ts:'updated_at', arr:'floats' },
];
async function pullTable(p){
  const since = S.pulls[p.t] || '1970-01-01T00:00:00Z';
  const k = p.key || 'id';
  const rows = await sb(`${p.t}?select=*&${p.ts}=gte.${encodeURIComponent(since)}&order=${p.ts}.asc&limit=1000`, {method:'GET'});
  for (const row of rows){
    const arr = S[p.arr]; const i = arr.findIndex(x=>x[k]===row[k]);
    if (i>=0) arr[i]=row; else arr.push(row);
    if (!S.pulls[p.t] || row[p.ts] > S.pulls[p.t]) S.pulls[p.t] = row[p.ts];
  }
}
async function pullAll(){
  for (const p of PULLS) await pullTable(p);
  try {
    for (const p of PULLS_V2) await pullTable(p);
    // 開催情報(1行のみ・LWW)
    const since = S.pulls['event_config'] || '1970-01-01T00:00:00Z';
    const cfgs = await sb(`event_config?select=*&updated_at=gte.${encodeURIComponent(since)}&order=updated_at.asc`, {method:'GET'});
    for (const row of cfgs){
      S.event = row.data;
      if (!S.pulls['event_config'] || row.updated_at > S.pulls['event_config']) S.pulls['event_config'] = row.updated_at;
    }
  } catch(e){ console.warn('v2テーブル未作成(マイグレーション待ち):', e.message); }
  ui.devices = await sb(`devices?select=*`, {method:'GET'});
  save();
}
async function heartbeat(){
  await sb('devices?on_conflict=id', { method:'POST', headers:{Prefer:'resolution=merge-duplicates'},
    body: JSON.stringify([{ id:S.cfg.deviceId, name:S.cfg.device, pending:S.outbox.length, last_seen:nowIso() }]) });
}
let syncing = false;
async function syncTick(){
  renderChip();
  if (!cfgOk() || syncing) return;
  syncing = true;
  try {
    await pushOutbox();
    await pullAll();
    await heartbeat();
    ui.lastSyncAt = Date.now(); ui.syncErr = false;
  } catch(e){ ui.syncErr = true; console.warn('sync:', e.message); }
  syncing = false;
  renderChip();
  // 入力中の再描画はフォーカス喪失・入力消失を招くのでスキップ(次のtickで反映される)
  const ae = document.activeElement;
  if (!ae || !['INPUT','TEXTAREA','SELECT'].includes(ae.tagName)) renderPreservingForms();
}
// 同期tickの再描画で、明示保存(「適用」等)前の入力値が消えるのを防ぐ。
// 画面内の全フォーム入力値を退避→render→復元。ナビゲーション(go)は素のrenderなので意図通りリセットされる。
function renderPreservingForms(){
  const keep = {};
  document.querySelectorAll('main input, main textarea, main select').forEach(el=>{
    if (el.id) keep[el.id] = el.type==='checkbox' ? el.checked : el.value;
  });
  render();
  for (const id in keep){
    const el = document.getElementById(id);
    if (el){ if (el.type==='checkbox') el.checked = keep[id]; else el.value = keep[id]; }
  }
}
function renderChip(){
  const c = $id('chip');
  if (!cfgOk()){ c.textContent='ローカル(同期未設定)'; c.className=''; return; }
  if (ui.syncErr || !navigator.onLine){ c.textContent=`オフライン・未送信${S.outbox.length}件`; c.className='off'; return; }
  c.textContent = S.outbox.length ? `送信中…(${S.outbox.length})` : '同期OK';
  c.className = 'on';
}

function addStockEvent(pid, delta, type, reason){
  const ev = { id:uuid(), product_id:pid, qty_delta:delta, type, reason:reason||null, device:S.cfg.device, created_at:nowIso() };
  S.events.push(ev);

function upsertProductLocal(p, isNew){
  if (isNew){ S.products.push(p); S.outbox.push({op:'insert', table:'products', row:p}); }
  else {
    const i = S.products.findIndex(x=>x.id===p.id); S.products[i]=p;
    const {id, ...patch} = p;
    S.outbox.push({op:'update', table:'products', id:p.id, patch});
  }
  save(); syncTick();
}

/* 誤タップ対策: タップ=+1のまま、長押し(550ms)でその商品の選択を解除 */
const lp = { timer:null, fired:false };
function prodDown(pid){
  lp.fired = false;
  clearTimeout(lp.timer);
  lp.timer = setTimeout(()=>{
    if (ui.cart[pid]){
      lp.fired = true; // 直後に発火するclickを無視させる
      delete ui.cart[pid];
      if (navigator.vibrate) navigator.vibrate(30);
      toast('選択を解除しました');
      render();
    }
  }, 550);
}
function prodPressEnd(){ clearTimeout(lp.timer); }
function prodClick(pid){
  if (lp.fired){ lp.fired = false; return; }
  tapProd(pid);
}
function tapProd(pid){
  const p = prodById(pid); const st = stockMap();
  const cur = ui.cart[pid]||0;
  if (p.category!=='draft' && cur+1 > (st[pid]||0)) { toast('在庫が足りません'); return; }
  ui.cart[pid] = cur+1;
  render();
}
function chgCart(pid, d){
  const p = prodById(pid); const st = stockMap();
  const nx = (ui.cart[pid]||0)+d;
  if (nx<=0) delete ui.cart[pid];
  else {
    if (p.category!=='draft' && nx > (st[pid]||0)) { toast('在庫が足りません'); return; }
    ui.cart[pid]=nx;
  }
  render();
}
function clearCart(){ ui.cart={}; render(); }

const cartTotal = () => cartItems().reduce((a,it)=>a+it.qty*it.unit_price,0);

function closeCo(force){

function renderCo(){

    box.innerHTML = head('確認') + `
      <div class="confirm-list">${items.map(it=>`<div class="cartrow"><span class="nm">${esc(it.name)}</span><span>×${it.qty}</span><span style="min-width:72px" class="right">${yen(it.qty*it.unit_price)}</span></div>`).join('')}</div>

function coPay(m){ co.payment=m; co.step = m==='cash' ? 'cash' : 'confirm'; renderCo(); }
function coRecv(v){ co.received += v; renderCo(); }

function coClr(){ co.received = 0; renderCo(); }

function coDone(btn){

const catPrice = c => {
  const g = genrePrice(c);              // pricesテーブルが正
  if (g!=null) return g;
  const ps = S.products.filter(p=>p.category===c);
  if (!ps.length) return '';
  return ps.every(p=>p.price===ps[0].price) ? ps[0].price : ''; // 移行前は商品から導出
};
function applyCatPrices(){
  let n = 0;
  for (const c of ['soft','nonal','can','draft','craft']){
    const v = parseInt($id('cp-'+c).value,10);
    if (!(v>=0)) continue;
    if (genrePrice(c)!==v){
      // pricesテーブルへ(正)。テーブル未作成時は退避されローカル値が使われる
      const row = { category:c, price:v, updated_at:nowIso() };
      const i = S.priceRows.findIndex(x=>x.category===c);
      if (i>=0) S.priceRows[i]=row; else S.priceRows.push(row);
      S.outbox.push({op:'upsert', table:'prices', conflict:'category', row});
      n++;
    }
    // 互換: 旧バージョンの端末のために products.price も揃えておく
    for (const p of S.products.filter(p=>p.category===c && p.price!==v)){
      upsertProductLocal({...p, price:v, updated_at:nowIso()}, false);
    }
  }
  save(); syncTick(); render();
  toast(n ? '価格を更新しました(全端末に反映されます)' : '変更はありません');
}

function saveProd(pid){
  const name = $id('f-name').value.trim();
  const category = $id('f-cat').value;
  const location = $id('f-loc').value;
  const price = parseInt(catPrice(category),10); // ジャンル一律価格を自動適用
  if (!name){ toast('商品名を入力してください'); return; }
  if (!(price>=0)){ toast(`${CATS[category]}の価格が未設定です。商品ページ上部の「ジャンル一律価格」で先に設定してください`); return; }
  // 生ビールは全体で1種のみ(要件)
  if (category==='draft' && S.products.some(p=>p.active && p.category==='draft' && p.id!==pid)){
    toast('生ビールは1種類のみ登録できます'); return;
  }
  if (pid){
    const p = {...prodById(pid), name, category, location, price, updated_at:nowIso()};
    upsertProductLocal(p, false);
  } else {
    const maxOrd = Math.max(0, ...S.products.map(p=>p.sort_order));
    upsertProductLocal({ id:uuid(), name, category, location, price, sort_order:maxOrd+1, active:true, updated_at:nowIso() }, true);
  }
  // ジャンル一律価格: 同ジャンルの他商品にも同じ価格を適用
  for (const q of S.products.filter(q=>q.category===category && q.price!==price))
    upsertProductLocal({...q, price, updated_at:nowIso()}, false);
  closeModal(); render(); toast('保存しました');
}
function hideProd(pid){
  if (!confirm('この商品を非表示にしますか?(売上履歴は残ります)')) return;
  upsertProductLocal({...prodById(pid), active:false, updated_at:nowIso()}, false);
  closeModal(); render();
}
function reviveProd(pid){ upsertProductLocal({...prodById(pid), active:true, updated_at:nowIso()}, false); render(); }
function moveProd(pid, dir){
  const act = activeProducts();
  const i = act.findIndex(p=>p.id===pid); const j = i+dir;
  if (j<0 || j>=act.length) return;
  const a = act[i], b = act[j];
  const tmp = a.sort_order;
  upsertProductLocal({...a, sort_order:b.sort_order, updated_at:nowIso()}, false);
  upsertProductLocal({...b, sort_order:tmp, updated_at:nowIso()}, false);
  render();
}

function salesStats(day='all', loc='all'){
  let done = S.sales.filter(s=>s.status==='completed');
  if (day!=='all') done = done.filter(s=>localDay(s.created_at)===day);
  if (loc!=='all') done = done.filter(s=>s.location===loc);
  const total = done.reduce((a,s)=>a+s.total,0);
  const cash = done.filter(s=>s.payment==='cash').reduce((a,s)=>a+s.total,0);
  const items = done.reduce((a,s)=>a+s.items.reduce((x,i)=>x+i.qty,0),0);
  return { done, total, cash, paypay:total-cash, count:done.length, items };
}

function cancelSale(id){
  const s = S.sales.find(x=>x.id===id);
  if (!s || !confirm(`この会計(${yen(s.total)})を取り消しますか?\n在庫は自動で戻ります。`)) return;
  s.status='cancelled'; s.cancelled_at=nowIso(); s.updated_at=nowIso();
  S.outbox.push({op:'update', table:'sales', id, patch:{status:'cancelled', cancelled_at:s.cancelled_at}});
  save(); render(); syncTick(); toast('取り消しました');
}
function restoreSale(id){
  const s = S.sales.find(x=>x.id===id);
  if (!s || s.status!=='cancelled') return;
  if (!confirm(`取消を解除して、この会計(${yen(s.total)})を元に戻しますか?\n売上に再計上され、在庫がもう一度引かれます。`)) return;
  s.status='completed'; s.cancelled_at=null; s.updated_at=nowIso();
  S.outbox.push({op:'update', table:'sales', id, patch:{status:'completed', cancelled_at:null}});
  save(); render(); syncTick(); toast('会計を元に戻しました');
}
function dlCSV(name, lines){
  const blob = new Blob(['﻿'+lines.join('\r\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  URL.revokeObjectURL(a.href);
}

  const lines = [`対象,${day==='all'?'全期間':day},${locName(loc)}`, '項目,数量,金額',
    `総売上,${st.items},${st.total}`, `現金,,${st.cash}`, `PayPay,,${st.paypay}`, ''];
  lines.push('商品,数量,金額');
  for (const [n,v] of Object.entries(byProd)) lines.push([n,v.qty,v.amt].map(csvEsc).join(','));
  dlCSV(`summary_${day==='all'?'all':day}_${loc}.csv`, lines);
}

const floatRowFor = (day, loc) => (S.floats||[]).find(f=>f.day===day && f.location===loc);
function floatTotalFor(day, loc){
  const r = floatRowFor(day, loc);
  if (r) return r.total;
  // cash_floats未作成(移行前)のフォールバック: 端末ローカルの旧保存値
  if (loc===S.cfg.loc && S.floatCounts) return DENOMS.reduce((a,d)=>a+(S.floatCounts[d]||0)*d,0);
  return 0;
}
function renderCash(){

      <label class="fld">実際のレジ金 — 金種ごとに枚数を数えて入力</label>
      ${denomRows(ui.cashDraft, null, 'stashCash')}
      <div class="kv" style="margin-top:8px"><span>実際のレジ金 合計</span><b id="f-floatsum">¥0</b></div>
      <div class="kv"><span>差額(実際 − 理論)</span><b id="f-diff">—</b></div>
      <label class="fld">メモ(任意)</label><input id="f-cnote" placeholder="例: 交代時点検"

      <button class="btn primary" style="width:100%; margin-top:14px; padding:14px" onclick="saveCashCount()">点検を記録する</button>`;
  }
  el.innerHTML = `
    <div class="toolbar"><button class="btn" onclick="go('report')">← 集計へ戻る</button></div>
    <h2>レジ点検(${esc(locName(S.cfg.loc))})</h2>
    <div class="card">
      <label class="fld">入力する項目</label>
      <select onchange="ui.cashMode=this.value; render()">
        <option value="counted" ${mode==='counted'?'selected':''}>実際のレジ金(点検)</option>
        <option value="float" ${mode==='float'?'selected':''}>釣り銭準備金(開始時の金庫残高)</option>
      </select>

    <div class="card">${S.cash.length ? [...S.cash].sort((a,b)=>b.created_at.localeCompare(a.created_at)).map(c=>`
      <div class="listrow"><span class="sub">${hhmm(c.created_at)}</span>
        <span class="grow">実際 ${yen(c.counted_amount)} / 理論 ${yen(c.theoretical_amount)}${c.location?` <span class="tag">${esc(locName(c.location))}</span>`:''}${c.note?`<br><span class="sub">${esc(c.note)}</span>`:''}</span>
        <b class="${c.diff===0?'':(c.diff>0?'diffpos':'diffneg')}">${c.diff>0?'+':''}${yen(c.diff).replace('¥-','−¥')}</b></div>`).join('')

function denomSum(){
  let sum = 0;
  for (const d of DENOMS){
    const n = parseInt(($id('fc-'+d)||{}).value,10)||0;
    const sub = n*d; sum += sub;
    const el = $id('fs-'+d); if (el) el.textContent = sub ? yen(sub) : '';
  }
  const t = $id('f-floatsum'); if (t) t.textContent = yen(sum);
  return sum;
}
function stashCash(el){ (ui.cashDraft = ui.cashDraft || {})[el.id] = el.value; cashDiff(); }
function stashFloat(el){ (ui.floatDraft = ui.floatDraft || {})[el.id] = el.value; denomSum(); }
function cashDiff(){
  const today = localDay(nowIso());
  const counted = denomSum();
  const any = DENOMS.some(d=>($id('fc-'+d)||{}).value);
  const theo = salesStats(today, S.cfg.loc).cash + floatTotalFor(today, S.cfg.loc);
  const el = $id('f-diff'); if (el) el.textContent = any ? yen(counted-theo).replace('¥-','−¥') : '—';
}
function saveFloat(){
  const today = localDay(nowIso());
  const counts = {}; let total = 0;
  for (const d of DENOMS){ const n = parseInt(($id('fc-'+d)||{}).value,10)||0; if (n){ counts[d]=n; total+=n*d; } }
  const row = { id:`${today}|${S.cfg.loc}`, day:today, location:S.cfg.loc, counts, total, updated_at:nowIso() };
  const i = S.floats.findIndex(f=>f.id===row.id); if (i>=0) S.floats[i]=row; else S.floats.push(row);
  S.floatCounts = counts; // 旧バージョン端末とテーブル未作成時の互換用
  S.outbox.push({op:'upsert', table:'cash_floats', row});
  ui.floatDraft = null; ui.cashMode = 'counted';
  save(); syncTick(); render(); toast(`準備金 ${yen(total)} を保存しました`);
}
function saveCashCount(){
  const today = localDay(nowIso());
  const counted = denomSum();
  const any = DENOMS.some(d=>($id('fc-'+d)||{}).value);
  if (!any){ toast('金種の枚数を入力してください'); return; }
  const flo = floatTotalFor(today, S.cfg.loc);
  const theo = salesStats(today, S.cfg.loc).cash + flo;
  const rec = { id:uuid(), location:S.cfg.loc, counted_amount:counted, float_amount:flo, theoretical_amount:theo, diff:counted-theo,
    note:($id('f-cnote')||{value:''}).value.trim()||null, created_at:nowIso() };
  S.cash.push(rec);
  S.outbox.push({op:'insert', table:'cash_counts', row:rec});
  ui.cashDraft = null;
  save(); render(); syncTick(); toast('点検を記録しました');
}

/* ================= 統計(グラフ) ================= */
const PIE_COLORS = ['#2a78d6','#1baf7a','#eda100','#008300','#4a3aa7','#e34948','#e87ba4','#eb6834'];
function eventDaysAll(){
  return [...new Set([...(S.event.days||[]), ...S.sales.map(s=>localDay(s.created_at))])].sort();
}
function dayChipLabel(d){
  const i = (S.event.days||[]).indexOf(d);
  return i>=0 ? `${i+1}日目 ${dayLabel(d)}` : dayLabel(d);
}
function renderStats(){
  const el = $id('view-stats');
  const loc = ui.stLoc || S.cfg.loc;
  const days = eventDaysAll();
  const today = localDay(nowIso());
  const day = ui.stDay || (days.includes(today) ? today : days[0]);
  const sales = S.sales.filter(s=>s.status==='completed' && s.location===loc && localDay(s.created_at)===day);
  const prods = activeProducts().filter(p=>locOf(p)===loc);

  // 5分ビン(OPEN〜END)
  const [oh,om] = (S.event.open||'10:30').split(':').map(Number);
  const [eh,em] = (S.event.end||'21:00').split(':').map(Number);
  const startMin = oh*60+om, endMin = eh*60+em;
  const nBins = Math.max(1, Math.ceil((endMin-startMin)/5));
  const bins = new Array(nBins).fill(0);
  const byProd = {};
  for (const s of sales){
    const d = new Date(s.created_at);
    const mm = d.getHours()*60 + d.getMinutes() - startMin;
    for (const it of s.items){
      byProd[it.product_id] = byProd[it.product_id] || { name:it.name, qty:0 };
      byProd[it.product_id].qty += it.qty;
      if (ui.stProd!=='all' && it.product_id!==ui.stProd) continue;
      if (mm>=0 && mm<endMin-startMin) bins[Math.floor(mm/5)] += it.qty;
    }
  }
  const shownTotal = bins.reduce((a,b)=>a+b,0);

  // 棒グラフSVG(横スクロール)。単系列: series-1 blue
  const BW=5, GAP=2, H=140, AXIS=22, LPAD=4;
  const W = nBins*(BW+GAP)+LPAD*2;
  const maxV = Math.max(...bins, 1);
  let barsSvg = '';
  for (let i=0;i<nBins;i++){
    const h = bins[i] ? Math.max(3, Math.round(bins[i]/maxV*(H-10))) : 0;
    const x = LPAD+i*(BW+GAP);
    if (bins[i]) barsSvg += `<rect x="${x}" y="${H-h}" width="${BW}" height="${h}" rx="2" fill="${ui.binSel===i?'#15325b':'#2a78d6'}"/>`;
    barsSvg += `<rect x="${x-1}" y="0" width="${BW+GAP}" height="${H}" fill="transparent" style="cursor:pointer" onclick="ui.binSel=${i};render()"/>`;
  }
  // 正時ごとの目盛(OPENが半端な時刻でも実際の時間位置に置く)
  let ticks = '';
  for (let m=Math.ceil(startMin/60)*60; m<=endMin; m+=60){
    const x = LPAD + (m-startMin)/5*(BW+GAP);
    ticks += `<line x1="${x}" y1="0" x2="${x}" y2="${H}" stroke="#e1e0d9" stroke-width="1"/>
      <text x="${x+2}" y="${H+15}" font-size="10" fill="#898781" style="font-variant-numeric:tabular-nums">${m/60}:00</text>`;
  }
  const binLabel = ui.binSel!=null ? (()=>{
    const m0 = startMin + ui.binSel*5;
    const f = m => `${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}`;
    return `${f(m0)}〜${f(m0+5)} : ${bins[ui.binSel]||0}本`;
  })() : 'グラフをタップすると5分枠の本数を表示';

  // 円グラフ(銘柄シェア・その日の全銘柄)
  const pieEntries = prods.map((p,idx)=>({ name:p.name, qty:(byProd[p.id]||{}).qty||0, color:PIE_COLORS[idx%PIE_COLORS.length] }))
    .filter(e=>e.qty>0);
  const pieTotal = pieEntries.reduce((a,e)=>a+e.qty,0);
  let pieSvg = '';
  if (pieTotal>0){
    if (pieEntries.length===1){
      pieSvg = `<circle cx="90" cy="90" r="80" fill="${pieEntries[0].color}" stroke="#fff" stroke-width="2"/>`;
    } else {
      let ang = -Math.PI/2;
      for (const e of pieEntries){
        const a1 = ang + e.qty/pieTotal*2*Math.PI;
        const x0=90+80*Math.cos(ang), y0=90+80*Math.sin(ang), x1=90+80*Math.cos(a1), y1=90+80*Math.sin(a1);
        const lg = (a1-ang)>Math.PI?1:0;
        pieSvg += `<path d="M90,90 L${x0.toFixed(1)},${y0.toFixed(1)} A80,80 0 ${lg} 1 ${x1.toFixed(1)},${y1.toFixed(1)} Z" fill="${e.color}" stroke="#fff" stroke-width="2"/>`;
        ang = a1;
      }
    }
  }
  el.innerHTML = `
    <div class="toolbar"><button class="btn" onclick="go('report')">← 集計へ戻る</button></div>
    <div class="chips" style="margin-bottom:2px">
      ${LOCS.map(l=>`<button class="${loc===l?'sel':''}" onclick="ui.stLoc='${l}';ui.binSel=null;render()">${locName(l)}</button>`).join('')}
    </div>
    <div class="chips" style="margin-bottom:2px">
      ${days.map(d=>`<button class="${day===d?'sel':''}" onclick="ui.stDay='${d}';ui.binSel=null;render()">${dayChipLabel(d)}</button>`).join('')}
    </div>
    <div class="chips" style="margin-bottom:10px">
      <button class="${ui.stProd==='all'?'sel':''}" onclick="ui.stProd='all';ui.binSel=null;render()">全体</button>
      ${prods.map(p=>`<button class="${ui.stProd===p.id?'sel':''}" onclick="ui.stProd='${p.id}';ui.binSel=null;render()">${esc(p.name)}</button>`).join('')}
    </div>
    <h2>5分ごとの販売本数 — ${ui.stProd==='all'?'全体':esc((prodById(ui.stProd)||{}).name||'')}(${shownTotal}本)</h2>
    <div class="card">
      <div class="sub" style="margin-bottom:6px; font-variant-numeric:tabular-nums">${binLabel}</div>
      <div style="overflow-x:auto"><svg width="${W}" height="${H+AXIS}" style="display:block">
        ${ticks}
        <line x1="0" y1="${H}" x2="${W}" y2="${H}" stroke="#c3c2b7" stroke-width="1"/>
        ${barsSvg}
      </svg></div>
      <div class="sub right" style="font-variant-numeric:tabular-nums">最大 ${maxV}本/5分</div>
    </div>
    <h2>銘柄ごとの販売本数(${dayChipLabel(day)}・${esc(locName(loc))})</h2>
    <div class="card">
      ${pieTotal ? `
        <svg width="180" height="180" viewBox="0 0 180 180" style="display:block; margin:0 auto 10px">${pieSvg}</svg>
        ${pieEntries.sort((a,b)=>b.qty-a.qty).map(e=>`
          <div class="row" style="padding:5px 0">
            <span style="width:12px;height:12px;border-radius:3px;background:${e.color};flex:none"></span>
            <span class="grow">${esc(e.name)}</span>
            <b style="font-variant-numeric:tabular-nums">${e.qty}本</b>
            <span class="sub" style="min-width:44px; text-align:right; font-variant-numeric:tabular-nums">${Math.round(e.qty/pieTotal*100)}%</span>
          </div>`).join('')}` : '<div class="empty">この日の売上がまだありません</div>'}
    </div>`;
}

/* ================= タイムテーブル ================= */
function parseTT(txt){
  const pad = t => t && t.length===4 ? '0'+t : t;
  return (txt||'').split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
    let m = l.match(/^(\d{1,2}:\d{2})\s*[-〜~]\s*(\d{1,2}:\d{2})\s+(.+)$/);
    if (m) return {s:pad(m[1]), e:pad(m[2]), name:m[3]};
    m = l.match(/^(\d{1,2}:\d{2})\s+(.+)$/); // 単発時刻(会場入り・END等)
    if (m) return {s:pad(m[1]), e:'', name:m[2]};
    return {s:'', e:'', name:l};
  });
}
const toMin = t => { if(!t) return null; const p=t.split(':'); return (+p[0])*60+(+p[1]); };
const fromMin = m => `${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}`;
function renderTT(){
  const el = $id('view-tt');
  const days = S.event.days||[];
  const today = localDay(nowIso());
  const day = ui.ttDay || (days.includes(today) ? today : days[0]);
  const di = Math.max(0, days.indexOf(day));
  const dKey = di===0 ? 'd1' : 'd2';
  const isToday = day===today;
  const nowD = new Date();
  const nowMin = nowD.getHours()*60 + nowD.getMinutes();

  const saka = parseTT(di===0 ? S.event.tt?.d1saka : S.event.tt?.d2saka).filter(a=>a.s);
  const oka  = parseTT(di===0 ? S.event.tt?.d1oka  : S.event.tt?.d2oka ).filter(a=>a.s);
  const shifts = normShifts(S.event.shifts)[dKey];

  // 会場全体の主要時刻(会場入り/OPEN/完全音止め/END撤収)
  const entryT = S.event.entry || '08:30', openT = S.event.open || '10:30';
  const soundoffT = S.event.soundoff || '20:45', endT = S.event.end || '21:00';

  // 時間レンジ(タイテ・シフト・主要時刻を全部含めて時間単位に丸める)
  let lo = Math.min(toMin(entryT), toMin(openT)), hi = toMin(endT);
  for (const a of [...saka, ...oka]){ const s=toMin(a.s), e=toMin(a.e); lo=Math.min(lo,s); hi=Math.max(hi,e??s); }
  for (const sh of shifts){ const s=toMin(sh.s), e=toMin(sh.e); if(s!=null){ lo=Math.min(lo,s); hi=Math.max(hi,e??s); } }
  lo = Math.floor(lo/60)*60; hi = Math.ceil(hi/60)*60;
  const PPM = 1.9, GUT = 34;
  const H = (hi-lo)*PPM;
  const y = m => (m-lo)*PPM;

  const isSub = name => /^(DJ|転換|END|OPEN)|チェック|リハ|会場入り|サウンド/.test(name);
  const actBg = di===0 ? '#a9c6ea' : '#f0b9c4'; // PDF準拠: 1日目=青 / 2日目=赤
  const COLS = [[0,32.4],[33.8,32.4],[67.6,32.4]]; // [left%, width%]
  const block = (a, col) => {
    const s = toMin(a.s), e = toMin(a.e);
    const hgt = e!=null && a.e ? Math.max(15,(e-s)*PPM-1) : 15;
    const sub = isSub(a.name);
    const live = isToday && a.e && s<=nowMin && nowMin<e;
    return `<div style="position:absolute; top:${y(s)}px; left:${COLS[col][0]}%; width:${COLS[col][1]}%; height:${hgt}px;
      background:${sub?'#eef1f6':actBg}; border-radius:4px; padding:1px 4px; overflow:hidden; box-sizing:border-box;
      ${live?'outline:2px solid #d63333; z-index:3;':''}">
      ${hgt>=28?`<div style="font-size:9px; color:#67718a; font-variant-numeric:tabular-nums">${a.s}${a.e?'-'+a.e:''}</div>`:''}
      <div style="font-size:${sub?'9.5':'11'}px; font-weight:${sub?'400':'700'}; line-height:1.15; color:${sub?'#67718a':'#1c2330'}">${esc(a.name)}</div>
    </div>`;
  };

  // シフト: 同一時間帯・同一販売所はまとめ、重なりはレーン分割
  const groups = {};
  for (const sh of shifts){
    if (!sh.s || !sh.e) continue;
    const k = `${sh.s}|${sh.e}|${sh.loc||''}`;
    (groups[k] = groups[k] || {s:sh.s, e:sh.e, loc:sh.loc, names:[]}).names.push(sh.name);
  }
  const gl = Object.values(groups).sort((a,b)=>toMin(a.s)-toMin(b.s) || toMin(a.e)-toMin(b.e));
  const laneEnds = [];
  for (const g of gl){
    let li = laneEnds.findIndex(endT => endT <= toMin(g.s));
    if (li < 0){ li = laneEnds.length; laneEnds.push(0); }
    laneEnds[li] = toMin(g.e); g.lane = li;
  }
  const laneN = Math.max(1, laneEnds.length);
  const shiftBlocks = gl.map(g=>{
    const s=toMin(g.s), e=toMin(g.e);
    const live = isToday && s<=nowMin && nowMin<e;
    const c = g.loc==='坂上' ? ['var(--nonal-bg)','var(--nonal)'] : ['var(--soft-bg)','var(--soft)'];
    const w = COLS[2][1]/laneN, left = COLS[2][0] + g.lane*w;
    return `<div style="position:absolute; top:${y(s)}px; left:${left}%; width:${w-0.5}%; height:${Math.max(15,(e-s)*PPM-1)}px;
      background:${c[0]}; border-left:3px solid ${c[1]}; border-radius:4px; padding:1px 3px; overflow:hidden; box-sizing:border-box;
      ${live?'outline:2px solid #d63333; z-index:3;':''}">
      <div style="font-size:9px; color:#67718a; font-variant-numeric:tabular-nums">${g.s}-${g.e}</div>
      <div style="font-size:10.5px; font-weight:700; line-height:1.2">${g.names.map(esc).join('・')}</div>
      <div style="font-size:9px; color:#67718a">${esc(locName(g.loc))}</div>
    </div>`;
  }).join('');

  // 時間目盛・OPEN/END・現在線
  let grid = '';
  for (let m=lo; m<=hi; m+=60){
    grid += `<div style="position:absolute; top:${y(m)}px; left:0; right:0; border-top:1px solid #eef1f6"></div>
      <div style="position:absolute; top:${y(m)+1}px; left:2px; font-size:9px; color:#898781; font-variant-numeric:tabular-nums">${fromMin(m)}</div>`;
  }
  for (const [t,label] of [[entryT,'会場入り'],[openT,'OPEN'],[soundoffT,'完全音止め'],[endT,'END 撤収']]){
    const m = toMin(t); if (m==null) continue;
    grid += `<div style="position:absolute; top:${y(m)}px; left:0; right:0; border-top:1.5px dashed #b0b8c9; z-index:2">
      <span style="position:absolute; left:2px; top:1px; font-size:9px; color:#67718a; font-weight:700; background:#fff">${label} ${esc(t)}</span></div>`;
  }
  const nowLine = (isToday && nowMin>=lo && nowMin<=hi) ? `
    <div id="nowline" style="position:absolute; top:${y(nowMin)}px; left:0; right:0; border-top:2px solid #d63333; z-index:6">
      <span style="position:absolute; right:4px; top:-9px; background:#d63333; color:#fff; font-size:10px; font-weight:700; padding:1px 7px; border-radius:99px">現在 ${fromMin(nowMin)}</span>
    </div>` : '';

  // 「今」のサマリー(演奏中/シフト中)
  const nowIn = list => list.filter(a=>a.e && toMin(a.s)<=nowMin && nowMin<toMin(a.e)).map(a=>a.name);
  const nowShift = gl.filter(g=>toMin(g.s)<=nowMin && nowMin<toMin(g.e)).map(g=>`${g.names.join('・')}(${locName(g.loc)})`);
  const nowBanner = isToday ? `<div class="banner warn" style="border-color:#e9a0a0; background:#fdecec; color:#8f2020">
    ▶ 坂: <b>${esc(nowIn(saka)[0]||'—')}</b> ／ 丘: <b>${esc(nowIn(oka)[0]||'—')}</b><br>
    🍺 シフト中: <b>${nowShift.length?esc(nowShift.join(' / ')):'—'}</b></div>` : '';

  el.innerHTML = `
    <div class="toolbar">
      <div class="chips" style="margin:0">${days.map(d=>`<button class="${day===d?'sel':''}" onclick="ui.ttDay='${d}';render()">${dayChipLabel(d)}</button>`).join('')}</div>
      <button class="btn sm" style="margin-left:auto" onclick="openShiftEditor()">✎ シフトを編集</button>
    </div>
    <div class="banner info" style="font-variant-numeric:tabular-nums">会場入り ${esc(entryT)} ・ OPEN ${esc(openT)} ・ 完全音止め ${esc(soundoffT)} ・ END ${esc(endT)}</div>
    ${nowBanner}
    <div style="display:flex; margin-left:${GUT}px; gap:1.4%; margin-bottom:4px">
      <b style="flex:1; font-size:12px; border-left:5px solid #e6c800; padding-left:6px">坂ステージ</b>
      <b style="flex:1; font-size:12px; border-left:5px solid #7ec24a; padding-left:6px">丘の上ステージ</b>
      <b style="flex:1; font-size:12px; border-left:5px solid var(--primary); padding-left:6px">シフト</b>
    </div>
    <div style="position:relative; height:${H}px; background:#fff; border:1px solid var(--line); border-radius:12px; overflow:hidden">
      ${grid}
      <div style="position:absolute; left:${GUT}px; right:3px; top:0; bottom:0">
        ${saka.map(a=>block(a,0)).join('')}
        ${oka.map(a=>block(a,1)).join('')}
        ${shiftBlocks}
      </div>
      ${nowLine}
    </div>
    <p class="sub">タイムテーブルの編集は⚙︎設定の管理者設定、シフトは上の「シフトを編集」から。</p>`;
  if (ui.ttWantScroll){
    ui.ttWantScroll = false;
    if (isToday) setTimeout(()=>{ const n=$id('nowline'); if(n) n.scrollIntoView({block:'center'}); }, 60);
  }
}

/* ---- シフト編集 ---- */
function openShiftEditor(){
  S.event.shifts = normShifts(S.event.shifts);
  ui.shiftPick = {}; ui.staffMng = false;
  renderShiftEditor();
  $id('modal').classList.add('open');
}
function renderShiftEditor(){
  const days = S.event.days||[];
  const today = localDay(nowIso());
  const day = ui.ttDay || (days.includes(today) ? today : days[0]);
  const di = Math.max(0, days.indexOf(day));
  const dKey = di===0 ? 'd1' : 'd2';
  const list = S.event.shifts[dKey].map((sh,i)=>({...sh,_i:i})).sort((a,b)=>(a.s||'').localeCompare(b.s||''));
  const staffNames = S.staff.filter(s=>s.active).map(s=>s.name);
  if (ui.staffMng){
    // 名簿の整理モード
    const inact = S.staff.filter(s=>!s.active);
    $id('mbox').innerHTML = `<div class="mhead"><b>メンバー名簿の整理</b><button class="x" onclick="ui.staffMng=false; renderShiftEditor()">← 戻る</button></div>
      ${S.staff.filter(s=>s.active).map(s=>`
        <div class="listrow"><span class="grow">${esc(s.name)}</span>
          <button class="btn sm danger" onclick="hideStaff('${s.id}')">非表示</button></div>`).join('') || '<div class="empty">メンバーがいません</div>'}
      ${inact.length?`<h2>非表示</h2>${inact.map(s=>`
        <div class="listrow"><span class="grow" style="opacity:.6">${esc(s.name)}</span>
          <button class="btn sm" onclick="reviveStaff('${s.id}')">再表示</button></div>`).join('')}`:''}`;
    return;
  }
  $id('mbox').innerHTML = `<div class="mhead"><b>シフトを編集(${di+1}日目)</b><button class="x" onclick="closeModal()">閉じる</button></div>
    <label class="fld">メンバーを選ぶ(複数可)</label>
    <div class="chips">${staffNames.length ? staffNames.map(n=>`
      <button class="${ui.shiftPick[n]?'sel':''}" onclick="toggleShiftPick(decodeURIComponent('${encodeURIComponent(n).replace(/'/g,'%27')}'))">${esc(n)}</button>`).join('')
      : '<span class="sub">下でメンバーを追加してください</span>'}</div>
    <div class="row" style="margin-top:6px">
      <input id="ns-name" placeholder="メンバーを追加(名前)" style="flex:1">
      <button class="btn sm primary" onclick="saveStaff()">＋追加</button>
      <button class="btn sm" onclick="ui.staffMng=true; renderShiftEditor()">名簿整理</button>
    </div>
    <div class="row">
      <div class="grow"><label class="fld">開始</label><input id="sh-s" type="time" value="${esc(ui.shS||S.event.open||'10:30')}"></div>
      <div class="grow"><label class="fld">終了</label><input id="sh-e" type="time" value="${esc(ui.shE||'')}"></div>
      <div class="grow"><label class="fld">販売所</label><select id="sh-loc">${LOCS.map(l=>`<option value="${l}" ${((ui.shLoc||S.cfg.loc)===l)?'selected':''}>${locName(l)}</option>`).join('')}</select></div>
    </div>
    <button class="btn primary" style="width:100%; margin-top:10px; padding:12px" onclick="addShifts()">＋ この時間で追加</button>
    <h2>登録済み(${di+1}日目)</h2>
    ${list.length ? list.map(sh=>`<div class="listrow">
      <span class="sub" style="font-variant-numeric:tabular-nums">${esc(sh.s)}-${esc(sh.e)}</span>
      <span class="grow"><b>${esc(sh.name)}</b> <span class="tag">${esc(locName(sh.loc))}</span></span>
      <button class="btn sm danger" onclick="delShift(${sh._i})">削除</button></div>`).join('')
      : '<div class="empty">まだありません</div>'}`;
}
function toggleShiftPick(name){
  ui.shS = $id('sh-s').value; ui.shE = $id('sh-e').value; ui.shLoc = $id('sh-loc').value;
  ui.shiftPick[name] = !ui.shiftPick[name];
  renderShiftEditor();
}
function pushEventConfig(){
  S.outbox.push({op:'upsert', table:'event_config', row:{id:1, data:S.event, updated_at:nowIso()}});
  save(); syncTick();
}
function addShifts(){
  const days = S.event.days||[]; const today = localDay(nowIso());
  const day = ui.ttDay || (days.includes(today) ? today : days[0]);
  const dKey = Math.max(0, days.indexOf(day))===0 ? 'd1' : 'd2';
  const s = $id('sh-s').value, e = $id('sh-e').value, loc = $id('sh-loc').value;
  const names = Object.keys(ui.shiftPick).filter(n=>ui.shiftPick[n]);
  if (!names.length){ toast('スタッフを選んでください'); return; }
  if (!s || !e || toMin(e)<=toMin(s)){ toast('時間を確認してください(終了は開始より後)'); return; }
  S.event.shifts = normShifts(S.event.shifts); // モーダル表示中に同期が旧形式を取り込んでも壊れないように
  for (const name of names) S.event.shifts[dKey].push({s, e, name, loc});
  pushEventConfig();
  ui.shiftPick = {}; ui.shS = e; ui.shE = ''; ui.shLoc = loc; // 次の枠の開始=今回の終了
  renderShiftEditor(); render(); toast(`${names.length}人分のシフトを追加しました`);
}
function delShift(idx){
  const days = S.event.days||[]; const today = localDay(nowIso());
  const day = ui.ttDay || (days.includes(today) ? today : days[0]);
  const dKey = Math.max(0, days.indexOf(day))===0 ? 'd1' : 'd2';
  ui.shS = $id('sh-s').value; ui.shE = $id('sh-e').value; ui.shLoc = $id('sh-loc').value;
  S.event.shifts = normShifts(S.event.shifts);
  S.event.shifts[dKey].splice(idx, 1);
  pushEventConfig();
  renderShiftEditor(); render();
}

/* ================= 設定 ================= */
function renderSettings(){
  const el = $id('view-settings');
  const c = S.cfg;
  const ev = S.event;
  el.innerHTML = `
    <div class="toolbar"><button class="btn" onclick="go('products')">🏷 商品・価格設定を開く</button></div>
    <h2>この端末</h2>
    <div class="card">
      <label class="fld">販売所(この端末が担当する売り場) — 選ぶと即切り替わります</label>
      <select id="s-loc" onchange="S.cfg.loc=this.value; ui.repLoc=null; ui.stLoc=null; ui.cart={}; save(); render(); toast(locName(this.value)+'に切り替えました')">${LOCS.map(l=>`<option value="${l}" ${c.loc===l?'selected':''}>${locName(l)}</option>`).join('')}</select>
      <label class="fld">端末名(履歴に記録されます)</label><input id="s-device" value="${esc(c.device)}">
      <label class="fld">在庫僅少の警告しきい値</label><input id="s-th" type="number" inputmode="numeric" value="${c.threshold}">
    </div>
    <h2>クラウド同期(Supabase)</h2>
    <div class="card">
      <label class="fld">Project URL</label><input id="s-url" value="${esc(c.url)}" placeholder="https://xxxx.supabase.co">
      <label class="fld">APIキー(sb_publishable_… または旧anon key)</label><textarea id="s-key" rows="3" style="font-size:12px">${esc(c.key)}</textarea>
      <label class="fld">パスコード(任意・全端末共通)</label><input id="s-pass" value="${esc(c.pass)}" placeholder="未設定ならロックなし">
      <div class="toolbar" style="margin-top:12px">
        <button class="btn primary" onclick="saveSettings()">保存</button>
        <button class="btn" onclick="testConn()">接続テスト</button>
        <button class="btn" onclick="shareLink()">設定共有リンクをコピー</button>
      </div>
      <p class="sub">他の端末はこの共有リンクを一度開くだけで同期設定が完了します。リンクは部外者に渡さないこと。</p>
    </div>
    <h2>端末一覧</h2>
    <div class="card">${ui.devices.length ? ui.devices.map(d=>`
      <div class="listrow"><span class="grow">${esc(d.name)}${d.id===c.deviceId?' <span class="tag">この端末</span>':''}</span>
        <span class="sub">${hhmm(d.last_seen)}</span>
        ${d.pending>0?`<span class="tag" style="background:#fdeaea;color:var(--ng)">未送信${d.pending}</span>`:'<span class="tag">同期OK</span>'}</div>`).join('')
      : '<div class="sub">同期を設定すると各端末が表示されます</div>'}</div>
    <h2>管理者設定(全端末共通)</h2>
    <div class="card">
      <label class="fld">イベント名</label><input id="ev-name" value="${esc(ev.name||'')}">
      <div class="row">
        <div class="grow"><label class="fld">開催 1日目</label><input id="ev-d1" type="date" value="${esc((ev.days||[])[0]||'')}"></div>
        <div class="grow"><label class="fld">開催 2日目</label><input id="ev-d2" type="date" value="${esc((ev.days||[])[1]||'')}"></div>
      </div>
      <div class="row">
        <div class="grow"><label class="fld">会場入り</label><input id="ev-entry" type="time" value="${esc(ev.entry||'')}"></div>
        <div class="grow"><label class="fld">OPEN</label><input id="ev-open" type="time" value="${esc(ev.open||'')}"></div>
      </div>
      <div class="row">
        <div class="grow"><label class="fld">完全音止め</label><input id="ev-soundoff" type="time" value="${esc(ev.soundoff||'')}"></div>
        <div class="grow"><label class="fld">END(撤収)</label><input id="ev-end" type="time" value="${esc(ev.end||'')}"></div>
      </div>
      <label class="fld">タイムテーブル 1日目・坂ステージ(1行 =「11:35-12:15 アーティスト」)</label>
      <textarea id="ev-tt-d1saka" rows="6">${esc(ev.tt?.d1saka||'')}</textarea>
      <label class="fld">タイムテーブル 1日目・丘の上ステージ</label>
      <textarea id="ev-tt-d1oka" rows="6">${esc(ev.tt?.d1oka||'')}</textarea>
      <label class="fld">タイムテーブル 2日目・坂ステージ</label>
      <textarea id="ev-tt-d2saka" rows="6">${esc(ev.tt?.d2saka||'')}</textarea>
      <label class="fld">タイムテーブル 2日目・丘の上ステージ</label>
      <textarea id="ev-tt-d2oka" rows="6">${esc(ev.tt?.d2oka||'')}</textarea>
      <p class="sub">「HH:MM-HH:MM 名前」で1行1枠。「HH:MM 名前」だけなら単発マーク(会場入り・END等)。DJ/転換/リハ/チェックを含む行は薄色で表示されます。シフトはタイテ画面の「シフトを編集」から。</p>
      <button class="btn primary" style="width:100%; margin-top:12px; padding:14px" onclick="saveEvent()">管理者設定を保存(全端末に反映)</button>
    </div>
    <h2>同期の状態</h2>
    <div class="card">
      <div class="kv"><span>未送信(送信待ち)</span><b>${S.outbox.length}件</b></div>
      <div class="kv"><span>送信できず退避</span><b>${(S.deadletter||[]).length}件</b></div>
      <div class="toolbar" style="margin-top:10px">
        <button class="btn" onclick="forceSync()">今すぐ同期</button>
        ${S.outbox.length ? `<button class="btn danger" onclick="clearOutbox()">未送信を破棄(${S.outbox.length}件)</button>` : ''}
      </div>
      ${S.outbox.length ? `<p class="sub">「未送信」が減らずに止まる場合、先頭の1件がサーバに拒否されている可能性があります。まず「今すぐ同期」、直らなければ「未送信を破棄」で詰まりを解消できます(破棄した内容は端末内の退避リストに残ります)。</p>` : ''}
    </div>
    <h2>メンテナンス</h2>
    <div class="card">
      <div class="toolbar">
        <button class="btn" onclick="repull()">サーバから全データ再取得</button>
        <button class="btn danger" onclick="wipe()">この端末のデータを全消去</button>
      </div>
    </div>`;
}
async function forceSync(){ ui.syncErr=false; await syncTick(); render(); toast(S.outbox.length? `未送信 ${S.outbox.length}件` : '同期しました'); }
function clearOutbox(){
  if (!S.outbox.length) return;
  if (!confirm(`未送信の${S.outbox.length}件を送信待ちから外します。\n(内容は端末内の退避リストに保存されます。)`)) return;
  (S.deadletter = S.deadletter || []).push(...S.outbox.map(op=>({op, error:'手動破棄', at:nowIso()})));
  S.outbox = []; ui.syncErr=false; save(); syncTick(); render(); toast('未送信をクリアしました');
}
function saveSettings(){
  S.cfg.loc = $id('s-loc').value;
  ui.repLoc = null; // 集計フィルタの既定を新しい自販売所に追従させる
  S.cfg.device = $id('s-device').value.trim() || 'レジ';
  S.cfg.threshold = parseInt($id('s-th').value,10)||10;
  S.cfg.url = $id('s-url').value.trim();
  S.cfg.key = $id('s-key').value.trim();
  S.cfg.pass = $id('s-pass').value.trim();
  save(); toast('保存しました'); renderChip(); syncTick();
}
async function testConn(){
  saveSettings();
  if (!cfgOk()){ toast('URLとanon keyを入力してください'); return; }
  try { await sb('products?select=id&limit=1',{method:'GET'}); toast('✅ 接続OK'); }
  catch(e){ alert('接続エラー:\n'+e.message); }
}
function shareLink(){
  saveSettings();
  if (!cfgOk()){ toast('先にURLとanon keyを設定してください'); return; }
  const payload = btoa(unescape(encodeURIComponent(JSON.stringify({u:S.cfg.url, k:S.cfg.key, p:S.cfg.pass}))));
  const link = location.origin + location.pathname + '#cfg=' + payload;
  (navigator.clipboard ? navigator.clipboard.writeText(link).then(()=>toast('リンクをコピーしました'))
    : Promise.reject()).catch(()=>prompt('このリンクを他の端末に共有:', link));
}
function saveEvent(){
  const data = {
    name: $id('ev-name').value.trim(),
    days: [$id('ev-d1').value, $id('ev-d2').value].filter(Boolean),
    entry: $id('ev-entry').value || '08:30',
    open: $id('ev-open').value || '10:30',
    soundoff: $id('ev-soundoff').value || '20:45',
    end: $id('ev-end').value || '21:00',
    tt: { d1saka:$id('ev-tt-d1saka').value, d1oka:$id('ev-tt-d1oka').value,
          d2saka:$id('ev-tt-d2saka').value, d2oka:$id('ev-tt-d2oka').value },
    shifts: normShifts(S.event.shifts), // シフトはタイテ画面で編集(ここでは保持)
  };
  S.event = data;
  S.outbox.push({op:'upsert', table:'event_config', row:{id:1, data, updated_at:nowIso()}});
  save(); syncTick(); toast('管理者設定を保存しました');
}
async function repull(){
  if (S.outbox.length && !confirm(`未送信が${S.outbox.length}件あります。先に同期するのが安全です。続行しますか?`)) return;
  S.pulls={}; S.products=[]; S.events=[]; S.sales=[]; S.cash=[]; S.staff=[]; S.staffDrinks=[]; S.priceRows=[]; S.floats=[];
  save(); toast('再取得中…'); await syncTick();
}
function wipe(){
  if (!confirm('この端末のローカルデータを全て消去します。よろしいですか?')) return;
  if (!confirm('サーバ上のデータは消えません。本当に消去しますか?')) return;
  localStorage.removeItem(LS_KEY); location.reload();
}

/* ================= パスコードゲート / 起動 ================= */
function tryUnlock(){
  if ($id('gatein').value === S.cfg.pass){ localStorage.setItem('fespos.unlocked','1'); $id('gate').classList.remove('open'); }
  else toast('パスコードが違います');
}
(function boot(){
  // 共有リンクからの設定取り込み
  if (location.hash.startsWith('#cfg=')){
    try {
      const o = JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(5)))));
      S.cfg.url=o.u||''; S.cfg.key=o.k||''; S.cfg.pass=o.p||'';
      save(); history.replaceState(null,'',location.pathname);
      toast('同期設定を取り込みました');
    } catch(e){}
  }
  if (S.cfg.pass && localStorage.getItem('fespos.unlocked')!=='1') $id('gate').classList.add('open');
  if ('serviceWorker' in navigator && (location.protocol==='https:' || location.hostname==='localhost' || location.hostname==='127.0.0.1'))
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  window.addEventListener('online', syncTick);
  window.addEventListener('offline', renderChip);
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) syncTick(); });
  go('register');
  renderChip();
  syncTick();
  setInterval(syncTick, 6000);
})();
</script>
